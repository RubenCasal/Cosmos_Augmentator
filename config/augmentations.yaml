cosmos:
  repo_root: "/your/absolute/path/to/cosmos-transfer2.5"
  model_variant: "seg"
  model_distilled: false
  disable_guardrails: true
  resolution: "720"
  guidance: 2.0
  num_steps: 36
  max_frames: 1
  num_video_frames_per_chunk: 1

  controls:
    seg:
      mode: external
      weight: 0.5
      subdir: "labels"
      encoding: "rgb"

    depth:
      mode: external
      weight: 0.5
      subdir: "depth"
      encoding: "rgb"

    edge:
      mode: on_the_fly
      weight: 0.5
      subdir: "edges"

dataset:
  input_root: "/your/absolute/path/to/your/input/dataset"
  output_root: "/your/absolute/path/to/your/output/dataset"
  original_dir: "."
  image_subdir: "images"
  label_subdir: "labels"
  image_ext: ".png"
  cache_dir: ".cosmos_control_cache"

augmentations:
  - name: "sunset"
    output_dir: "dataset_sunset"
    fraction: 1.0
    seed_base: 40
    prompt: >
      A photorealistic low-altitude top-down view of an outdoor area, seen from a camera
      looking straight down while moving smoothly forward. Warm late-afternoon warm light,
      softer shadows, and a natural sunset atmosphere across the scene.
    negative_prompt: >
      Cartoon, CGI, Simulation.

  - name: "dry_ground"
    output_dir: "dataset_dry_ground"
    fraction: 1.0
    seed_base: 140
    prompt: >
      A photorealistic low-altitude top-down view of an outdoor area, seen from a camera
      looking straight down while moving smoothly forward. A very dry environment with a
      dry-season appearance, sun-exposed ground, and a naturally dry atmosphere.
    negative_prompt: >
      Cartoon, CGI, Simulation.

  - name: "war_burnt_ground"
    output_dir: "dataset_war_burnt_ground"
    fraction: 1.0
    seed_base: 240
    prompt: >
      A photorealistic low-altitude top-down view of an outdoor area, seen from a camera
      looking straight down while moving smoothly forward. A war-affected environment with
      burned and blackened areas on the ground and a harsh conflict-zone atmosphere.
    negative_prompt: >
      Cartoon, CGI, Simulation.

  - name: "rain"
    output_dir: "dataset_rain"
    fraction: 1.0
    seed_base: 340
    prompt: >
      A photorealistic low-altitude top-down view of an outdoor area, seen from a camera
      looking straight down while moving smoothly forward. Rainy weather, wet surfaces,
      and a natural rainy atmosphere across the scene.
    negative_prompt: >
      Cartoon, CGI, Simulation.

  - name: "light_snow"
    output_dir: "dataset_light_snow"
    fraction: 1.0
    seed_base: 440
    prompt: >
      A photorealistic low-altitude top-down view of an outdoor area, seen from a camera
      looking straight down while moving smoothly forward. A lightly snow-covered environment
      with a natural winter atmosphere.
    negative_prompt: >
      Cartoon, CGI, Simulation.