  max_frames: 1
  num_video_frames_per_chunk: 1

  controls:
    seg:
      mode: external
      weight: 1.0
      subdir: "labels"
    depth:
      mode: on_the_fly
      weight: 0.9
      subdir: "depth"
    edge:
      mode: disabled
      weight: 1.0
      subdir: "edges"

dataset:
  input_root: "/home/airbots-workstation/Documents/isaac-sim-standalone-5.1.0-linux-x86_64/rozas_basler_stealth/output/2026_03_17_16_10_19/pinhole_dl_data_output/1"
  output_root: "/home/airbots-workstation/Documents/isaac-sim-standalone-5.1.0-linux-x86_64/rozas_basler_stealth/output/2026_03_17_16_10_19/pinhole_dl_data_output/1/augmented_outputs"
  original_dir: "."
  image_subdir: "images"
  image_ext: ".png"

augmentations:
  - name: "sunset"
    output_dir: "dataset_sunset"
    fraction: 1.0
    seed_base: 400
    prompt: >
      Photorealistic of this scene at sunset, with warm orange and
      golden light, long soft shadows, slightly darker terrain and vegetation, and
      realistic atmospheric haze towards the horizon, while preserving the relative
      positions of roads, buildings, ground and vegetation areas.
    negative_prompt: >
      midday lighting, flat lighting, harsh overhead sun, cartoon, CGI, game graphics,
      low detail, flat shading, oversmoothed, synthetic render, unrealistic colors
